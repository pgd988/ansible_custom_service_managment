---

- name: Run "apt-get update"
  apt:
    update_cache: yes
  when: ansible_facts['os_family'] == "Debian"

- name: Disable Password Authentication
  lineinfile: 
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
    create: true
  notify: restart ssh

- name: Root login switching off
  lineinfile: 
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
    state: present
    create: true
  notify: restart ssh

- name: Additional App install
  package: pkg={{ item }} state=present 
  with_items:
    - vim
    - wget
    - curl
    - git
    - sudo



- name: Install SSHGuard
  package: pkg=sshguard state=present
  become: true
  when: enable_sshguard | default(false)

- name: Ensure SSHGuard is running
  service: name=sshguard state=started enabled=yes
  when: enable_sshguard | default(false)


- name: Install Cloudflare Zero Trust agent
  apt:
    deb: "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
  when: enable_cloudflare_zt | default(false)

