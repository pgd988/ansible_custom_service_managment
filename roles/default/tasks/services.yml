---

- name: Disable Password Authentication
  lineinfile: 
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
    create: true
  notify: restart ssh

- name: Root login switching off
  lineinfile: 
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
    state: present
    create: true
  notify: restart ssh

- name: Additional App install
  package: pkg={{ item }} state=installed 
  with_items:
    - vim
    - wget
    - curl
    - git
    - ufw

- name: Configure UFW default deny
  ufw:
    state: enabled
    policy: deny

- name: Configure UFW allow ports
  ufw:
    rule: allow
    port: '{{ item }}'
    proto: tcp
  with_items:
    - '22'
    - '53'
    - '443'

- name: Configure UFW allow ICMP (already allowed by default in UFW, but ensuring UFW is active)
  ufw:
    state: enabled

- name: Install SSHGuard
  package: pkg=sshguard state=installed
  become: true
  when: enable_sshguard | default(false)

- name: Ensure SSHGuard is running
  service: name=sshguard state=started enabled=yes
  when: enable_sshguard | default(false)

- name: Prometheus Node Exporter install
  package: pkg=prometheus-node-exporter state=installed 
  when: enable_node_exporter | default(true)

- name: Install Cloudflare Zero Trust agent
  apt:
    deb: "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
  when: enable_cloudflare_zt | default(false)

